<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Dark Mode</title>
  <link rel="stylesheet" href="style.css">
  <!-- this we used to add icons on website -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
  <div class="hero">
    <nav>
      <img src="portfolio_site_img/logo.png"  class="logo">
      <ul>
        <li><a href="">HOME</a></li>
        <li><a href="">ABOUT</a></li>
        <li><a href="">PORTFOLIO</a></li>
        <li><a href="">SERVICES</a></li>
        <li><a href="">HIRE ME</a></li>
      </ul>
      <img src="dark theme icon/moon.png" id="icon">
    </nav>

    <div class="info">
      <h1>I'm <span>Kate </span>Amelia</h1>
      <p>This is my official portfolio website to showcase my all works related to web <br> development and UI design.</p>
      <a href="">Download CV</a>
    </div>

    <div class="img-box">
      <img src="portfolio_site_img/pattern.png" class="back-img">
      <img src="portfolio_site_img/girl.png" class="main-img" >
    </div>

    <div class="social-links">
      <a href=""><i class="fab fa-linkedin-in"></i></a>
      <a href=""><i class="fab fa-behance"></i></a>
      <a href=""><i class="fab fa-dribbble"></i></a>
    </div>
  </div>

  <script>

    var icon=document.getElementById("icon");

    // when we click on icon it will add or remove the dark theme
    icon.onclick=function(){
      // add the class name dark-theme, we use this class name in css for changing the color
      document.body.classList.toggle("dark-theme");
      // now for changing icon image
      if(document.body.classList.contains("dark-theme")){
        icon.src="dark theme icon/sun.png";
      }else{
        icon.src="dark theme icon/moon.png";
      }
    }

  </script>
</body>
</html>
